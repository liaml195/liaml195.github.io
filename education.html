<!DOCTYPE html>
<html lang="en">

<head>
    <link href='https://fonts.googleapis.com/css?family=Poppins' rel='stylesheet'>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/projects.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education</title>
</head>

<body>

    <main class="page">

        <!-- Navbar -->

        <header class="navbar">
            <h1 class="title">Education</h1>
            <div class="dropdown">
                <input type="search" name="search" id="searchBar" placeholder="Search...">
                <div id="searchResults" class="dropdown-content"></div>
            </div>
            <ul class="navlist">
                <li id="home"><a href="index.html" class="href">Home</a></li>
                <li id="about"><a href="about.html" class="href">About</a></li>
                <li id="projects"><a href="projects.html" class="href">Projects</a></li>
                <li id="education"><a href="education.html" class="href">Education</a></li>
            </ul>
        </header>

        <div class="container">


            <!-- Project Categories -->

            <div class="content">
                
            </div>


            <!-- Sidebar -->


            <aside class="sidebar">
                <h2>Accessibility</h2>

                <section class="accessibility-group">
                    <h3>Text Size</h3>
                    <div class="controls">
                        <button>Small</button>
                        <button>Medium</button>
                        <button>Large</button>
                    </div>
                </section>

                <section class="accessibility-group">
                    <h3>Theme</h3>
                    <div class="controls">
                        <button data-theme="light">Light</button>
                        <button data-theme="dark">Dark</button>
                        <button data-theme="contrast">High Contrast</button>
                    </div>
                </section>

                <section class="accessibility-group">
                    <h3>Display</h3>
                    <label>
                        <input type="checkbox"> Reduce Motion
                    </label>
                    <label>
                        <input type="checkbox"> Dyslexia Font
                    </label>
                </section>
            </aside>
        </div>
    </main>

    <script src="javascript/header.js"></script>
    <script src="javascript/projects.js"></script>
</body>

</html>
